<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UxPlore Buster - Levels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1> LEVEL SELECTION </h1>
    <div id="user-info" style="position: absolute; right: 20px; top: 20px; display: flex; align-items: center; color: var(--accent-cyan);"></div>
  </header>

  <div class="content-area">
    <h1 class="section-title">Select Your Level</h1>

    <!-- Congratulations Card (shown when all levels complete) -->
    <div id="congratulations-card" style="display: none; margin-bottom: 30px; text-align: left;">
      <div class="card" style="background: linear-gradient(135deg, rgba(46, 204, 113, 0.2), rgba(46, 204, 113, 0.1)); border: 2px solid var(--success); cursor: pointer; transition: all 0.3s ease;" 
           onclick="showCongratulations()" onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 0 30px rgba(46, 204, 113, 0.4)'" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow=''">
        <h2 style="color: var(--success); font-size: 32px; margin: 0 0 10px 0;">🎉 ALL LEVELS COMPLETE! 🎉</h2>
        <p style="color: var(--accent-cyan); font-size: 16px; font-weight: bold; margin: 0;">Click to celebrate your achievement!</p>
      </div>
    </div>

    <div class="levels-grid" id="levels-container">
      <!-- Levels will be generated by JavaScript -->
    </div>

    <div style="text-align: left; margin-top: 40px; margin-bottom: 40px;">
      <button class="btn btn-secondary" onclick="navigateTo('introduction')" style="padding: 12px 30px;">
        ← BACK
      </button>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    checkAuth();

    const levels = [
      {
        id: 'level1',
        number: 1,
        title: 'Introduction to UX/UI Design',
        description: 'Learn the fundamentals, objectives, and importance of UX/UI design',
        topics: ['Design Basics', 'Objectives', 'Applications', 'Industry Uses']
      },
      {
        id: 'level2',
        number: 2,
        title: 'Hardware & Equipment',
        description: 'Understand hardware requirements for UX/UI design work',
        topics: ['RAM', 'CPU', 'GPU', 'Monitors']
      },
      {
        id: 'level3',
        number: 3,
        title: 'Basic Design Principles',
        description: 'Master practical design elements and typography',
        topics: ['UI Elements', 'Typography', 'Color Theory', 'Visual Hierarchy']
      },
      {
        id: 'level4',
        number: 4,
        title: 'Design Through Code',
        description: 'Learn HTML and CSS to implement your designs',
        topics: ['HTML Basics', 'CSS Styling', 'Layout', 'Responsive Design']
      },
      {
        id: 'level5',
        number: 5,
        title: 'Debugging & Optimization',
        description: 'Identify and fix design issues and optimize your work',
        topics: ['Code Debugging', 'Performance', 'Best Practices', 'Optimization']
      }
    ];

    function renderLevels() {
      const container = document.getElementById('levels-container');
      const congratsCard = document.getElementById('congratulations-card');
      const progress = StorageManager.getLevelProgress();

      // Check if all levels are completed
      const allLevelsCompleted = progress.level1.completed && progress.level2.completed && 
                                 progress.level3.completed && progress.level4.completed && 
                                 progress.level5.completed;
      
      // Show congratulations card if all levels complete
      if (allLevelsCompleted) {
        congratsCard.style.display = 'block';
      }

      levels.forEach(level => {
        const isUnlocked = StorageManager.isLevelUnlocked(level.id);
        const levelData = progress[level.id];
        const isCompleted = levelData && levelData.completed;

        const levelCard = document.createElement('div');
        levelCard.className = `level-card ${!isUnlocked ? 'locked' : ''}`;
        
        if (!isUnlocked) {
          levelCard.style.cursor = 'not-allowed';
          levelCard.innerHTML = `
            <div class="level-number">🔒</div>
            <div class="level-title">${level.title}</div>
            <div class="level-status">LOCKED - Complete Level ${level.number - 1} First</div>
          `;
        } else {
          levelCard.style.cursor = 'pointer';
          levelCard.onclick = () => navigateTo(level.id);
          
          const statusClass = isCompleted ? 'unlocked' : '';
          const statusText = isCompleted ? `✓ COMPLETED (${levelData.score}%)` : 'AVAILABLE';
          
          levelCard.innerHTML = `
            <div class="level-number">${level.number}</div>
            <div class="level-title">${level.title}</div>
            <p style="color: var(--text-secondary); font-size: 12px; margin: 10px 0; line-height: 1.4;">
              ${level.description}
            </p>
            <div style="margin: 15px 0;">
              <p style="font-size: 11px; color: var(--accent-cyan); margin-bottom: 8px;">Topics:</p>
              <div style="display: flex; flex-wrap: wrap; gap: 5px;">
                ${level.topics.map(topic => `
                  <span style="
                    padding: 2px 6px;
                    background: rgba(0, 217, 255, 0.2);
                    border: 1px solid var(--accent-cyan);
                    border-radius: 2px;
                    font-size: 11px;
                    color: var(--accent-cyan);
                  ">${topic}</span>
                `).join('')}
              </div>
            </div>
            <div class="level-status ${statusClass}">${statusText}</div>
          `;
        }

        container.appendChild(levelCard);
      });
    }

    function showCongratulations() {
      const progress = StorageManager.getLevelProgress();
      const totalScore = (progress.level1.score + progress.level2.score + progress.level3.score + 
                         progress.level4.score + progress.level5.score) / 5;
      
      let message = `
        <div style="text-align: center; padding: 20px 10px; max-height: 90vh; overflow-y: auto;">
          <h1 style="color: var(--success); font-size: clamp(32px, 8vw, 48px); margin: 0 0 15px 0; text-shadow: 0 0 20px rgba(46, 204, 113, 0.5);">🎉 CONGRATULATIONS! 🎉</h1>
          <h2 style="color: var(--accent-cyan); font-size: clamp(24px, 6vw, 32px); margin: 0 0 15px 0;">You Have Completed All Levels!</h2>
          <p style="color: white; font-size: clamp(14px, 4vw, 20px); margin: 0 0 20px 0; line-height: 1.6;">
            You have successfully mastered all aspects of UX/UI Design!<br>
            <strong style="color: var(--accent-pink);">Average Score: ${totalScore.toFixed(1)}%</strong>
          </p>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px auto; max-width: 100%; width: 100%;">
            <div style="padding: 15px; background: rgba(46, 204, 113, 0.2); border: 2px solid var(--success); border-radius: 8px;">
              <p style="color: var(--success); font-size: clamp(20px, 6vw, 28px); margin: 0 0 5px 0; font-weight: bold;">5/5</p>
              <p style="color: white; margin: 0; font-size: clamp(12px, 3vw, 14px);">Levels Completed</p>
            </div>
            <div style="padding: 15px; background: rgba(61, 139, 253, 0.2); border: 2px solid var(--accent-cyan); border-radius: 8px;">
              <p style="color: var(--accent-cyan); font-size: clamp(20px, 6vw, 28px); margin: 0 0 5px 0; font-weight: bold;">🏆</p>
              <p style="color: white; margin: 0; font-size: clamp(12px, 3vw, 14px);">UX/UI Master</p>
            </div>
          </div>
          <p style="color: var(--text-secondary); font-size: clamp(12px, 3vw, 16px); margin: 15px 0 0 0;">
            You're now ready to apply your UX/UI design expertise to real-world projects!
          </p>
          <div style="margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;">
            <button class="btn btn-primary" onclick="document.getElementById('congrats-modal').style.display='none'" style="padding: 10px 20px; margin: 5px; font-size: clamp(12px, 3vw, 14px);">
              CLOSE
            </button>
            <button class="btn btn-secondary" onclick="navigateTo('halloffame')" style="padding: 10px 20px; margin: 5px; background: rgba(124, 58, 237, 0.3); border: 2px solid var(--accent-purple); font-size: clamp(12px, 3vw, 14px);">
              🏆 HALL OF FAME
            </button>
          </div>
        </div>
      `;
      
      // Create modal
      let modal = document.getElementById('congrats-modal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'congrats-modal';
        document.body.appendChild(modal);
      }
      
      modal.style.display = 'flex';
      modal.style.position = 'fixed';
      modal.style.top = '0';
      modal.style.left = '0';
      modal.style.width = '100%';
      modal.style.height = '100%';
      modal.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
      modal.style.zIndex = '2000';
      modal.style.alignItems = 'center';
      modal.style.justifyContent = 'center';
      modal.style.overflowY = 'auto';
      modal.style.padding = '0';
      modal.style.boxSizing = 'border-box';
      modal.onclick = (e) => {
        if (e.target === modal) {
          modal.style.display = 'none';
        }
      };
      
      modal.innerHTML = `
        <div style="background: linear-gradient(135deg, rgba(15, 13, 26, 0.95), rgba(26, 20, 40, 0.95)); border: 2px solid var(--accent-cyan); border-radius: 16px; padding: clamp(20px, 5vw, 40px); max-width: 90vw; width: 100%; max-height: 90vh; box-shadow: 0 0 50px rgba(61, 139, 253, 0.5); overflow-y: auto;">
          ${message}
        </div>
      `;
    }

    // Render levels on page load
    renderLevels();
  </script>
  
  <footer style="position: fixed; bottom: 0; left: 0; width: 100%; text-align: center; padding: 15px; background: rgba(0, 0, 0, 0.3); border-top: 1px solid var(--accent-cyan); color: white; font-size: 12px; font-weight: bold; box-sizing: border-box; z-index: 999;">
    © 2026 Andres & Lomboy - UxPlore Buster
  </footer>
</body>
</html>
