<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UxPlore Buster - Create Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1> PLAYER PROFILE GENERATOR </h1>
  </header>

  <div class="container">
    <div class="form-container" style="max-width: 600px;">
      <h2 class="section-title" style="text-align: center;">Create Game Profile</h2>
      
      <form onsubmit="handleProfileCreation(event)">
        <!-- Game Username -->
        <div class="form-group">
          <label for="game-username">Game Username</label>
          <input type="text" id="game-username" placeholder="Enter your gaming name" required>
        </div>

        <!-- Avatar Selection -->
        <div class="form-group">
          <label>Select Avatar</label>
          <div class="avatar-grid">
            <div class="avatar-option" data-avatar="avatar-m.png" onclick="selectAvatar(this)">
              <img src="avatar-m.png" alt="Male Avatar 1" style="width: 60px; height: 60px; border-radius: 4px;">
            </div>
            <div class="avatar-option" data-avatar="avatar-m2.png" onclick="selectAvatar(this)">
              <img src="avatar-m2.png" alt="Male Avatar 2" style="width: 60px; height: 60px; border-radius: 4px;">
            </div>
            <div class="avatar-option" data-avatar="avatar-f.png" onclick="selectAvatar(this)">
              <img src="avatar-f.png" alt="Female Avatar 1" style="width: 60px; height: 60px; border-radius: 4px;">
            </div>
            <div class="avatar-option" data-avatar="avatar-f2.png" onclick="selectAvatar(this)">
              <img src="avatar-f2.png" alt="Female Avatar 2" style="width: 60px; height: 60px; border-radius: 4px;">
            </div>
          </div>
        </div>

        <!-- Info -->
        <div class="card" style="margin-top: 25px;">
          <p style="font-size: 14px; color: var(--text-secondary);">
            <strong style="color: var(--accent-cyan);">RULES:</strong><br>
            • Your game username can be different from your account username<br>
            • You can change your avatar and game username anytime in settings<br>
            • Proceed to start your UX/UI design journey
          </p>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
          CONFIRM & PROCEED
        </button>
      </form>

      <p id="profile-message" style="text-align: center; margin-top: 15px;"></p>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    // Check if user already has a profile
    const currentUser = StorageManager.getUser();
    if (!currentUser) {
      window.location.href = 'login.html';
    }

    const existingProfile = StorageManager.getProfile();
    if (existingProfile) {
      // Profile already exists, skip to introduction
      window.location.href = 'introduction.html';
    }

    let selectedAvatar = null;

    function selectAvatar(element) {
      // Remove previous selection
      document.querySelectorAll('.avatar-option').forEach(opt => {
        opt.classList.remove('selected');
      });

      // Add selection to clicked avatar
      element.classList.add('selected');
      selectedAvatar = element.getAttribute('data-avatar');
    }

    function handleProfileCreation(event) {
      event.preventDefault();
      const gameUsername = document.getElementById('game-username').value;
      const messageDiv = document.getElementById('profile-message');

      if (!gameUsername) {
        messageDiv.innerHTML = '<span style="color: var(--error);">⚠ Username is required</span>';
        return;
      }

      if (!selectedAvatar) {
        messageDiv.innerHTML = '<span style="color: var(--error);">⚠ Please select an avatar</span>';
        return;
      }

      // Create profile
      const profile = {
        gameUsername: gameUsername,
        avatar: selectedAvatar,
        createdAt: new Date().toISOString(),
        levelProgress: {
          level1: { completed: false, score: 0 },
          level2: { completed: false, score: 0 },
          level3: { completed: false, score: 0 },
          level4: { completed: false, score: 0 },
          level5: { completed: false, score: 0 }
        }
      };

      StorageManager.setProfile(profile);
      messageDiv.innerHTML = '<span style="color: var(--success);">✓ Profile created! Proceeding...</span>';

      setTimeout(() => {
        window.location.href = 'introduction.html';
      }, 1000);
    }
  </script>
  
  <footer style="position: fixed; bottom: 0; left: 0; width: 100%; text-align: center; padding: 15px; background: rgba(0, 0, 0, 0.3); border-top: 1px solid var(--accent-cyan); color: white; font-size: 12px; font-weight: bold; box-sizing: border-box; z-index: 999;">
    © 2026 Andres & Lomboy - UxPlore Buster
  </footer>
</body>
</html>
