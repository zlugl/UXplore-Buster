<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UxPlore Buster - Authentication</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>⚙ AUTHENTICATION SYSTEM ⚙</h1>
  </header>

  <div class="container">
    <div class="form-container">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login', this)">Login</button>
        <button class="tab" onclick="switchTab('signup', this)">Sign Up</button>
      </div>

      <!-- Login Tab -->
      <div class="tab-content active" id="login">
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="login-username">Name</label>
            <input type="text" id="login-username" placeholder="Enter your name" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">LOGIN</button>
        </form>
        <p id="login-message" style="text-align: center; margin-top: 15px;"></p>
      </div>

      <!-- Sign Up Tab -->
      <div class="tab-content" id="signup">
        <form onsubmit="handleSignup(event)">
          <div class="form-group">
            <label for="signup-username">Name</label>
            <input type="text" id="signup-username" placeholder="Choose a name" required>
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="Create a password" required minlength="6">
          </div>
          <div class="form-group">
            <label for="signup-confirm">Confirm Password</label>
            <input type="password" id="signup-confirm" placeholder="Confirm your password" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">CREATE ACCOUNT</button>
        </form>
        <p id="signup-message" style="text-align: center; margin-top: 15px;"></p>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    function switchTab(tabName, element) {
      // Hide all tabs
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('active');
      });

      // Show selected tab
      document.getElementById(tabName).classList.add('active');
      element.classList.add('active');
    }

    function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      const messageDiv = document.getElementById('login-message');

      if (!username || !password) {
        messageDiv.innerHTML = '<span style="color: var(--error);">⚠ All fields required</span>';
        return;
      }

      const user = StorageManager.loginUser(username, password);
      if (user) {
        messageDiv.innerHTML = '<span style="color: var(--success);">✓ Login successful! Redirecting...</span>';
        StorageManager.setUser(user);
        setTimeout(() => {
          // Check if profile exists
          const profile = StorageManager.getProfile();
          if (profile) {
            window.location.href = 'introduction.html';
          } else {
            window.location.href = 'profile.html';
          }
        }, 1000);
      } else {
        messageDiv.innerHTML = '<span style="color: var(--error);">✗ Invalid username or password</span>';
      }
    }

    function handleSignup(event) {
      event.preventDefault();
      const username = document.getElementById('signup-username').value;
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      const messageDiv = document.getElementById('signup-message');

      if (!username || !password || !confirm) {
        messageDiv.innerHTML = '<span style="color: var(--error);">⚠ All fields required</span>';
        return;
      }

      if (password !== confirm) {
        messageDiv.innerHTML = '<span style="color: var(--error);">✗ Passwords do not match</span>';
        return;
      }

      if (password.length < 6) {
        messageDiv.innerHTML = '<span style="color: var(--error);">✗ Password must be at least 6 characters</span>';
        return;
      }

      if (StorageManager.userExists(username)) {
        messageDiv.innerHTML = '<span style="color: var(--error);">✗ Username already exists</span>';
        return;
      }

      const newUser = StorageManager.registerUser(username, password);
      messageDiv.innerHTML = '<span style="color: var(--success);">✓ Account created! Redirecting to login...</span>';
      
      setTimeout(() => {
        // Switch to login tab
        document.getElementById('login').classList.add('active');
        document.getElementById('signup').classList.remove('active');
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.querySelectorAll('.tab')[1].classList.remove('active');
        document.getElementById('login-username').value = username;
        document.getElementById('login-password').value = '';
      }, 1000);
    }
  </script>
  
  <footer style="position: fixed; bottom: 0; left: 0; width: 100%; text-align: center; padding: 15px; background: rgba(0, 0, 0, 0.3); border-top: 1px solid var(--accent-cyan); color: white; font-size: 12px; font-weight: bold; box-sizing: border-box; z-index: 999;">
    © 2026 Andres & Lomboy - UxPlore Buster
  </footer>
</body>
</html>
