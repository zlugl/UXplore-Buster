<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UxPlore Buster - Welcome</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100%;
      background: linear-gradient(135deg, #f9e65c 0%, #7c3aed 50%, #3d8bfd 100%) !important;
      overflow: hidden;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }
    
    .container {
      background: transparent !important;
      background-image: none !important;
      animation: none !important;
      border: none !important;
      box-shadow: none !important;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      box-sizing: border-box;
      flex: 0 1 auto;
      min-height: calc(100vh - 60px);
    }
    
    .logo-container {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    
    .logo-container img {
      border: none !important;
      box-shadow: none !important;
      animation: float 3s ease-in-out infinite !important;
      width: 100%;
      max-width: 400px;
      height: auto;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container" onclick="navigateTo('login')">
      <img src="UXplore Buster Logo.png" alt="UxPlore Buster Logo">
    </div>
  </div>

  <script src="js/utils.js"></script>
  
  <footer style="position: fixed; bottom: 0; left: 0; width: 100%; text-align: center; padding: 10px; background: rgba(0, 0, 0, 0.3); border-top: 1px solid var(--accent-cyan); color: white; font-size: 12px; font-weight: bold; box-sizing: border-box; z-index: 999;">
    © 2026 Andres & Lomboy - UxPlore Buster
  </footer>
</body>
</html>
