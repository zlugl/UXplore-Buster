<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UxPlore Buster - Hall of Fame</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>🏆 HALL OF FAME 🏆</h1>
    <div style="position: absolute; right: 20px; top: 20px;">
      <button class="btn btn-secondary" onclick="window.history.back()" style="padding: 10px 20px; font-size: 12px;">
        ← BACK
      </button>
    </div>
  </header>

  <div class="content-area" style="padding-bottom: 120px;">
    <h1 class="section-title">Top Players Rankings</h1>

    <div class="card" style="text-align: center; margin-bottom: 30px;">
      <p style="color: var(--text-secondary); font-size: 14px;">
        Compete with other players and showcase your UX/UI design mastery!
      </p>
    </div>

    <div id="rankings-container" style="margin-bottom: 40px;"></div>

    <div id="no-players-message" style="display: none;">
      <div class="card" style="text-align: center;">
        <p style="color: var(--text-secondary); font-size: 16px; margin: 40px 0;">
          ℹ️ No players have completed their profiles yet!
        </p>
        <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 30px;">
          Be the first to start your UX/UI design journey and claim the top spot.
        </p>
        <button class="btn btn-primary" onclick="window.location.href='index.html'" style="padding: 14px 30px;">
          START PLAYING
        </button>
      </div>
    </div>

    <div style="text-align: center; margin-top: 40px; margin-bottom: 40px;">
      <button class="btn btn-secondary" onclick="renderRankings()" style="padding: 12px 30px; margin: 5px;">
        🔄 REFRESH RANKINGS
      </button>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    // ── helpers ──────────────────────────────────────────────────────────────

    function getAvatarPathLocal(avatarFilename) {
      if (!avatarFilename) return '👾';
      // emoji or already a path with slash
      if (avatarFilename.includes('/') || /\p{Emoji}/u.test(avatarFilename)) return avatarFilename;
      return avatarFilename;
    }

    // Pull every player stored locally so we never show 0 for the current user
    function getLocalRankings() {
      const profiles = JSON.parse(localStorage.getItem('uxplore_profiles') || '{}');
      const rows = [];

      Object.keys(profiles).forEach(key => {
        const p = profiles[key];
        if (!p || !p.gameUsername) return;

        // Support both key names used in different parts of the codebase
        const lp = p.levelProgress || p.levelScores || {
          level1: { completed: false, score: 0 },
          level2: { completed: false, score: 0 },
          level3: { completed: false, score: 0 },
          level4: { completed: false, score: 0 },
          level5: { completed: false, score: 0 }
        };

        const totalScore = Object.values(lp).reduce(
          (sum, l) => sum + (l && l.completed ? (l.score || 0) : 0), 0
        );
        const completedLevels = Object.values(lp).filter(l => l && l.completed).length;

        rows.push({
          gameUsername: p.gameUsername,
          avatar: p.avatar || '👾',
          totalScore,
          completedLevels,
          levelScores: lp   // normalised name for the renderer
        });
      });

      return rows.sort((a, b) => b.totalScore - a.totalScore)
                 .map((r, i) => ({ ...r, rank: i + 1 }));
    }

    // Merge server list + local list, keeping the better score per username
    function mergeRankings(serverRows, localRows) {
      const map = new Map();

      // Local data first (guaranteed current session)
      localRows.forEach(r => {
        map.set(r.gameUsername.toLowerCase(), { ...r });
      });

      // Server data wins only if score is higher (server may lag)
      serverRows.forEach(r => {
        const key = r.gameUsername.toLowerCase();
        const existing = map.get(key);
        if (!existing || r.totalScore > existing.totalScore) {
          // Normalise server key name (server uses levelScores already in halloffame endpoint)
          map.set(key, { ...r, levelScores: r.levelScores || r.levelProgress || {} });
        }
      });

      return Array.from(map.values())
                  .sort((a, b) => b.totalScore - a.totalScore)
                  .map((r, i) => ({ ...r, rank: i + 1 }));
    }

    // ── renderer ─────────────────────────────────────────────────────────────

    function buildCard(player, index) {
      const medalEmoji = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${player.rank}`;

      // Support both key names coming from different sources
      const levelScores = player.levelScores || player.levelProgress || {};

      const avatarSrc = getAvatarPathLocal(player.avatar);
      const isImage = avatarSrc && /\.(png|jpg|gif)$/i.test(avatarSrc);
      const avatarHTML = isImage
        ? `<img src="${avatarSrc}" alt="Avatar" style="width:60px;height:60px;border-radius:8px;margin-right:12px;border:2px solid var(--accent-cyan);">`
        : `<span style="font-size:40px;margin-right:12px;">${avatarSrc || '👾'}</span>`;

      const levelCells = ['level1', 'level2', 'level3', 'level4', 'level5'].map((lvl, i) => {
        const entry = levelScores[lvl] || { completed: false, score: 0 };
        const done  = entry.completed === true;
        const score = done ? (entry.score || 0) : null;
        const color = done ? 'var(--success)' : 'var(--text-secondary)';
        const bg    = done ? 'rgba(0,255,136,0.1)' : 'rgba(160,160,192,0.1)';
        return `
          <div style="padding:8px;background:${bg};border:1px solid ${color};border-radius:4px;text-align:center;">
            <p style="font-size:11px;color:var(--text-secondary);margin:0 0 4px 0;">L${i + 1}</p>
            <p style="font-size:14px;font-weight:bold;color:${color};margin:0;">
              ${done ? score + '%' : '—'}
            </p>
          </div>`;
      }).join('');

      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '20px';
      card.innerHTML = `
        <div style="display:grid;grid-template-columns:auto 1fr auto;gap:20px;align-items:center;">
          <div style="text-align:center;font-size:32px;font-weight:bold;color:var(--accent-cyan);">
            ${medalEmoji}
          </div>
          <div>
            <div style="display:flex;align-items:center;margin-bottom:10px;">
              ${avatarHTML}
              <div>
                <p style="font-size:18px;color:var(--accent-cyan);font-weight:bold;margin:0;">
                  ${player.gameUsername}
                </p>
                <p style="color:var(--text-secondary);font-size:12px;margin:5px 0 0 0;">
                  Completed ${player.completedLevels} / 5 Levels
                </p>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px;">
              ${levelCells}
            </div>
          </div>
          <div style="text-align:right;">
            <p style="font-size:24px;color:var(--accent-purple);font-weight:bold;margin:0;">
              ${player.totalScore}
            </p>
            <p style="color:var(--text-secondary);font-size:12px;margin:5px 0 0 0;">total points</p>
          </div>
        </div>`;
      return card;
    }

    // ── main ─────────────────────────────────────────────────────────────────

    async function renderRankings() {
      const container    = document.getElementById('rankings-container');
      const noPlayersMsg = document.getElementById('no-players-message');
      container.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:40px;">Loading rankings…</p>';

      // Always load local data immediately so the current user's score shows
      const localRows  = getLocalRankings();
      let   serverRows = [];

      try {
        const res  = await fetch('/api/halloffame');
        const data = await res.json();
        if (Array.isArray(data.users)) {
          serverRows = data.users.map((u, i) => ({
            ...u,
            rank: i + 1,
            // normalise: server endpoint already computes totalScore & completedLevels
            levelScores: u.levelScores || {}
          }));
        }
      } catch (e) {
        console.warn('Hall of Fame API unavailable, using local data only.');
      }

      const rankings = mergeRankings(serverRows, localRows);

      container.innerHTML = '';

      if (rankings.length === 0) {
        noPlayersMsg.style.display = 'block';
        return;
      }

      noPlayersMsg.style.display = 'none';
      rankings.forEach((player, index) => {
        container.appendChild(buildCard(player, index));
      });
    }

    renderRankings();
  </script>

  <footer style="position:fixed;bottom:0;left:0;width:100%;text-align:center;padding:15px;background:rgba(0,0,0,0.3);border-top:1px solid var(--accent-cyan);color:white;font-size:12px;font-weight:bold;box-sizing:border-box;z-index:999;">
    © 2026 Andres & Lomboy - UxPlore Buster
  </footer>
</body>
</html>
